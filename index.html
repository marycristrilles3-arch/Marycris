<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soap Store</title></head>

<body>

<header>
    <h1>🧼 Soap Store</h1>
    <p>Cart Items: <span id="cart-count">0</span></p>
</header>

<div class="container">

    <!-- PRODUCTS -->
    <div class="products" id="product-list"></div>

    <!-- CART -->
    <div class="cart">
        <h2>🛒 Cart</h2>
        <div id="cart-items"></div>
        <h3>Total: ₱<span id="total">0</span></h3>
        <button onclick="clearCart()">Clear Cart</button>
    </div>

</div>
</body>
</html>
