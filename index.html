<!DOCTYPE html>
<html lang="en">
<head>

<title>Soap Store</title>
<link rel="stylesheet" href="style.css">

</head>

<body>
<header>

    <p>Cart Items: <span id="cart-count">0</span></p>
</header>

<div class="container">

</div>
<footer>
    <p>© 2025 Soap Store. All rights reserved.</p>
</footer>
</body>
<script src="./page.js"></script>
</html>
